# CD: Сборка, публикация и деплой на сервер
name: CD

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_USER_BOT: ghcr.io/eugenepycharm/user-bot
  IMAGE_ADMIN_BOT: ghcr.io/eugenepycharm/admin-bot

jobs:
  build-and-push:
    name: Сборка и публикация образов
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Логин в GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Извлечение метаданных (tag, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_USER_BOT }}
            ${{ env.IMAGE_ADMIN_BOT }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') || github.ref == format('refs/heads/{0}', 'master') }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Сборка User Bot
      - name: Сборка и push User Bot
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_USER_BOT }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_USER_BOT }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      # Сборка Admin Bot
      - name: Сборка и push Admin Bot
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.admin
          push: true
          tags: |
            ${{ env.IMAGE_ADMIN_BOT }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_ADMIN_BOT }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  deploy:
    name: Деплой на сервер
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Логин в GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Подготовка .env файла
        run: |
          # Создаём .env из secrets
          echo "YOOKASSA_TEST_TOKEN=${{ secrets.YOOKASSA_TEST_TOKEN }}" > .env
          echo "YOOKASSA_LIVE_TOKEN=${{ secrets.YOOKASSA_LIVE_TOKEN }}" >> .env
          echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" >> .env
          echo "ADMIN_BOT_TOKEN=${{ secrets.ADMIN_BOT_TOKEN }}" >> .env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
          echo "LOG_LEVEL=${{ secrets.LOG_LEVEL }}" >> .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "ADMIN_TELEGRAM_IDS=${{ secrets.ADMIN_TELEGRAM_IDS }}" >> .env
          echo "SERVER_API_URL=${{ secrets.SERVER_API_URL }}" >> .env
          echo "SERVER_USERNAME=${{ secrets.SERVER_USERNAME }}" >> .env
          echo "SERVER_PASSWORD=${{ secrets.SERVER_PASSWORD }}" >> .env
          echo "SERVER_LOCATION=${{ secrets.SERVER_LOCATION }}" >> .env
          echo "SERVER_NAME=${{ secrets.SERVER_NAME }}" >> .env
          echo "SERVER_MAX_CLIENTS=${{ secrets.SERVER_MAX_CLIENTS }}" >> .env

      - name: Копирование файлов на сервер
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.deploy.yml,.env"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Деплой приложения на сервере
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            
            # Логин в GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull новых образов
            docker-compose pull
            
            # Остановка старых контейнеров
            docker-compose down
            
            # Запуск новых контейнеров
            docker-compose -f docker-compose.deploy.yml up -d --force-recreate
            
            # Очистка старых образов
            docker image prune -f --filter "until=24h"
            
            # Проверка статуса
            docker-compose -f docker-compose.deploy.yml ps

      - name: Уведомление о статусе деплоя
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" == "success" ]; then
            echo "✅ Деплой успешен!"
          else
            echo "❌ Деплой не удался!"
            exit 1
          fi
